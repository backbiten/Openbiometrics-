name: CI — QA/QC Gate

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  qa:
    name: QA/QC Gate
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install QA dependencies
        run: pip install pytest flake8

      - name: Run QA gate
        run: python tools/qa/qa.py
